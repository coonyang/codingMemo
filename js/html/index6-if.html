<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/index5.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="black-bg">
        <div class="white-bg">
            <h4>로그인하세요</h4>
            <form action="success.html">
                <div class="my-3">
                    <input type="text" class="form-control" id="email">
                </div>
                <div class="my-3">
                    <input type="password" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">전송</button>
                <button type="button" class="btn btn-danger" id="close">닫기</button>
            </form>
        </div>
    </div>

    <script>
        // if / else if 는 앞이 맞다면 뒤에꺼가 실행이 안됨
        // if 로만 구성한다면 하나씩 다 검사함 
        // 엄격한 비교 === 느슨한 비교 ==
        // and && or ||

        if (1 != 3) {
            console.log('정답');
        } else if (1 == 2) {
            console.log('정답2');
        } else {
            console.log('정답3');
        }

        document.querySelector('form').addEventListener('submit', function (e) {
            var 입력한값 = document.getElementById('email').value;
            if (document.querySelectorAll('.form-control')[0].value == '') {
                alert('아이디를 입력하라고');
                e.preventDefault();
            }
            if (document.querySelectorAll('.form-control')[1].value == '') {
                alert('비밀번호 입력하라고');
                e.preventDefault();
            }
            if (document.querySelectorAll('.form-control')[1].value.length < 6) {
                alert('비밀번호 6자리 이상 입력하라고');
            }
            if (/\S+@\S+\.\S+/.test(입력한값) == false) {
                alert('이메일 형식으로 입력하셈');
                e.preventDefault();
            }
            // 정규직 /[a-zA-z]/.test() = () 안에 알파벳 하나가 들어있나 확인가능
            // /^a/ 첫글자가 a인가 /a$/ 마지막글자가 a인가 /a|b/ a나 b 중 하나가 들어있나
            // /a+/ 뒤에오는 글자들도 a 와 일치하면 다 찾아내라
            // /\S+/ 모든 문자들을 찾아내라
            // /[A-Z]/.test() = ()안에 대문자 알파벳이 있는지 찾아내라
        })

    </script>

    <button id="bt">로그인</button>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script>
        $('#bt').on('click', function () {
            $('.black-bg').addClass('see');
        })
        $('#close').on('click', function () {
            $('.black-bg').removeClass('see');
        })
    </script>
</body>

</html>
