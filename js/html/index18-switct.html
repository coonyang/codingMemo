<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="quiz">
        <h4> 물에 빠지면 누구먼저 구할 것임?</h4>

        <button>신창섭</button>
        <button>모작</button>
        <button>리선족</button>
    </div>
    <script>

        document.querySelector('#quiz').addEventListener('click', function (e) {
            switch (e.target.innerHTML) {
                case '신창섭':
                    alert('정상화가 급하신가보네요');
                    break
                case '모작':
                    alert('쌀파는게 급하신가보네요')
                    break
                case '리선족':
                    alert('리부트를 좋아하시나보네요')
                    break
            }

        })






        // if 문과 비슷한 스위치 문법
        let 변수 = 2 + 2;
        // if(변수 == 3){

        // } else if()

        // 스위치는 변수 1개만 테스트 가능
        switch (변수) {
            // 3이면 이거 실행
            case 3:
                alert('변수가 3이넹');
                break
            case 4:
                alert('변수가 4네영');
                break
            default:
                alert('아무것도 해당안됨');

        }

    </script>


</body>

</html>
