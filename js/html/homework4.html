<head>

<body>
    <input type="text" id="answer">
    <button id="send-answer">제출</button>
    <script>

        var 예금액 = 60000;
        var 미래예금액 = 0;

        if (예금액 > 50000) {
            미래예금액 = 예금액 * 1.2 * 1.2;


        } else {
            미래예금액 = 예금액 * 1.15 * 1.15;
        }

        console.log(미래예금액)


        var first = 360;

        first = first + (first / 3 * 2) + (first / 3);

        console.log(first);

        var count = 0;

        document.getElementById('send-answer').addEventListener('click', function () {
            count += 1;
            var 유저답안 = document.querySelector('#answer').value;
            if (유저답안 == '1335') {
                alert('성공')
            } else if (count >= 3 && 유저답안 != '1335') {
                alert('멍청아')
            }
        })
    </script>
