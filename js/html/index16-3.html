<body>

                <img src="https://via.placeholder.com/600" class="w-100">

            </div> -->

    <div class="container">
        <button class="btn btn-danger">더보기</button>

    <div class="container"></div>
    <button class="wwe">가격정렬</button>
    </div>
    <div class="container"></div>
    <button class="wwe2">글자역순정렬</button>
    </div>
    <div class="container"></div>
    <button class="wwe3">6만원 이하 상품</button>
    </div>
    <a href="장바구니.html">장바구니</a>
    <script>
        var count = 0;
        $('.btn').click(function () {
            count++;
            if (count == 1) {
                $.get('https://codingapple1.github.io/js/more1.json').done(function (data) {
                    상품추가(data)
                })
            }
            if (count == 2) {
                $.get('https://codingapple1.github.io/js/more2.json').done(function (data) {
                    상품추가(data)
                })
            }
            if (count >= 2) {
                document.querySelector('.btn').classList.add('see');
            }
        })

    </script>

    <script>
        var products = [
            { id: 0, price: 70000, title: 'Blossom Dress' },
            { id: 1, price: 50000, title: 'Springfield Shirt' },
            { id: 2, price: 60000, title: 'Black Monastery' }
        ];

        // 구매 버튼 누르면 장바구니에 상품명 추가
        // 로컬 스토리지 > 개발자 도구 앱플리케이션에 있는 개발자가 정보를 몰래 저장할수있는 공간
        // key value 형태로 저장가능
        // localStorage.setItem 은 저장 .getItem 은 출력 .removeItem 은 삭제
        localStorage.setItem('이름', 'kim');
        localStorage.getItem('이름');


        // Array Object 저장하려면 json으로 바꾸면댐
        // 제이슨으로 바꾸는법 > JSON.stringify(array) / 제이슨을 다시 어레이로 바꾸는법 > JSON.parse(arr)[]
        // 세션 스토리지에 넣을꺼면 localStorage > sessionStorage 바꾸면됨
        var arr = [1, 2, 3];
        var newArr = JSON.stringify(arr);
        localStorage.setItem('num', newArr);
        var 출력 = localStorage.getItem('num');
        console.log(JSON.parse(출력)[0]);


        function 상품추가(data) {
            data.forEach((a) => {
                var 템플릿 =
                    `<div class="col-sm-4">
        <img src="https://via.placeholder.com/600" class="w-100">
        <h5>${a.title}</h5>
        <p>가격 : ${a.price}</p>
        <button class="buy">구매</button>
      </div>`;
                $('.row').append(템플릿)
            });
        }

        상품추가(products);

        $('.wwe').click(function () {
            products.sort(function (a, b) {
                return a.price - b.price;
            })
            $('.row').html('');

            products.forEach((a) => {
                var 템플릿 =
                    `<div class="col-sm-4">
        <img src="https://via.placeholder.com/600" class="w-100">
        <h5>${a.title}</h5>
        <p>가격 : ${a.price}</p>
      </div>`;
                $('.row').append(템플릿)
            });
        })

        $('.wwe2').click(function () {
            products.sort(function (a, b) {
                if (a.title < b.title) return 1;
                if (a.title > b.title) return -1;
                return 0;
            })
            $('.row').html('');

            products.forEach((a) => {
                var 템플릿 =
                    `<div class="col-sm-4">
        <img src="https://via.placeholder.com/600" class="w-100">
        <h5>${a.title}</h5>
        <p>가격 : ${a.price}</p>
      </div>`;
                $('.row').append(템플릿)
            });
        })

        $('.wwe3').click(function () {
            var newarray = products.filter(function (a) {
                return a.price <= 60000
            })
            $('.row').html('');

            newarray.forEach((a) => {
                var 템플릿 =
                    `<div class="col-sm-4">
        <img src="https://via.placeholder.com/600" class="w-100">
        <h5>${a.title}</h5>
        <p>가격 : ${a.price}</p>
      </div>`;
                $('.row').append(템플릿)
            });
        })



        // e.target.previousElementSibling.previousElementSibling 제이쿼리안쓸때
        // .previousElementSibling 은 이전 형제 요소를 가리키기때문에 한번더쓰면 이전 이전 형제 요소를 말함
        // siblings = 형제요소 찾아줌
        // 구매 버튼을 클릭했을때 cart 라는 스토리지가 있다면 스토리지를 꺼내 배열에 e.target을 추가하고 다시 배열로 저장해라
        // cart 가 없다면 <(null)이 뜨면> e.target을 cart 라는 스토리지에 저장해라

        $('.buy').on('click', function (e) {
            // e.target 한 구매 버튼의 h5 와 p 태그 내용을 찾아줌
            var titlea = $(e.target).siblings('h5').text();
            var priceText = $(e.target).siblings('p').text();
            //parseInt는 문자를 정수와 문자열로 나눠줌 / replace는 처음 '' 부분을 다음 '' 부분으로 바꿔줌
            var pricea = parseInt(priceText.replace('가격 : ', ''))

            // 스토리지에 저장할 형식 [{title:상품명,price:가격,num:갯수}]
            var obj = { title: titlea, price: pricea, num: 1 };

            // cart에 뭐가 있으면 내용물을 다시 array/obj 형태로 바꾸고 새로운 내용을 추가함
            if (localStorage.getItem('cart') != null) {
                var out = JSON.parse(localStorage.getItem('cart'));
                var found = false;

                // cart 안의 아이템과 새로운 추가아이템이 똑같다면 num(갯수)를 올림
                out.forEach(function (item) {
                    if (item.title == titlea) {
                        item.num++;
                        found = true;
                    }
                })
                //cart 안에 중복한 아이템이 없다면 구매한 내용을 추가해줌
                if (!found) {
                    out.push(obj);
                }
                // 다시 스토리지형식으로 바꿔줌
                localStorage.setItem('cart', JSON.stringify(out));
            } else { // cart 안의 아이템이 아무것도 없다면 첫 구매 내용 추가
                localStorage.setItem('cart', JSON.stringify([obj]))
            }
        })

        // 스토리지 비우기
        localStorage.removeItem('cart')
        localStorage.removeItem('price')
        localStorage.removeItem('이름');
        localStorage.removeItem('num');
    </script>

    <!-- 장바구니와 연결 -->

</body>

</html>
