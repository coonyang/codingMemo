<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/index5.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="black-bg">
        <div class="white-bg">
            <h4>로그인하세요</h4>
            <button class="btn btn-danger" id="close">닫기</button>
        </div>
    </div>

    <button id="bt">로그인</button>
    <!-- 부트스트렙에서 가져온 class는 dark를 light로 클래스이름을 바꾸면 색이바뀜 -->
    <span class="badge bg-dark" id="dark">Dark 🔄</span>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script>
        $('#bt').on('click', function () {
            $('.black-bg').addClass('see');
        })
        $('#close').on('click', function () {
            $('.black-bg').removeClass('see');
        })

        // badge 클릭 회수가 홀수면 light 짝수면 dark
        // var = 변수(숫자, 문자 등 모든 자료 다 넣을수 있음)
        var count = 0;

        document.getElementById('dark').addEventListener('click', function () {
            count++;
            // count += 1;
            // count = count + 1;
            if (count % 2 == 0) {
                document.getElementById('dark').innerHTML = 'Dark 🔄';
            } else {
                document.getElementById('dark').innerHTML = 'Light 🔄';
            }
        })

        // 변수의 선언, 할당, 범위
        // 함수 안의 변수는 밖으로 못나감
        function 함수() {
            var 이름 = 'kim';
            console.log(이름);
        }
        console.log(이름);

        // var, const 재선언 불가능 재할당 불가능, let 재선언 불가능
        var i = 'kim'

    </script>
</body>

</html>
