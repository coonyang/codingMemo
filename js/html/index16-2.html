            count++;

    <script>
        var products = [
            { id: 0, price: 70000, title: 'Blossom Dress' },
            { id: 1, price: 50000, title: 'Springfield Shirt' },
            { id: 2, price: 60000, title: 'Black Monastery' }
        ];

        //array 정렬하는법
        // a 와 b 는 Array 안의 자료
        // return 오른쪽이 양수면 a를 오른쪽으로 음수면 b를 오른쪽으로
        // 7 - 3 = 4 니까 7을 오른쪽으로 3 - 5 = -2 니까 5를 오른쪽으로... 쭉 다해봐서 정렬해줌
        // 역순정렬하고싶으면 b - a 하면댐

        var 어레이 = [7, 3, 5, 2, 40];
        var 어레이2 = ['a', 'c', 'b'];
        // sort는 문자열 정렬이고 안에 콜백함수를 넣으면 숫자오름차순으로 할수있음
        어레이.sort(function (a, b) {
            return a - b
        });
        어레이2.sort();
        console.log(어레이, 어레이2);

        // 문자열 역순은
        // 어레이2.sort(function (a, b) {
        //         if (a < b) return 1;

        //         return 0;
        //     });
        // 좀 더 간단하게 하면
        // 어레이2.sort((a, b) => a < b ? 1 : a > b ? -1 : 0); or
        // 어레이2.sort((a, b) => b.localeCompare(a));

        // filter = 원하는 내용만 뽑아줌
        // 원본을 변형해주지 않기 때문에 새 변수를 넣어 사용해야함
        var 어레이3 = [7, 3, 5, 2, 40];
        var 어레이3필터정렬 = 어레이3.filter(function (a) {
            return a < 4;
        })
        console.log(어레이3필터정렬);

        // map은 자료 전부 변형시켜줌
        var 어레이4 = [7, 3, 5, 2, 40];
        var 어레이4필터정렬 = 어레이4.map(function (a) {
            return a * 4;
        })
        console.log(어레이4필터정렬);

        // forEach로 데이타 받아와서 상품 진열하기
        function 상품추가(data) {
            // data.forEach(function(a){})과 같음
            data.forEach((a) => {
                var 템플릿 =
                    `<div class="col-sm-4">
        <img src="https://via.placeholder.com/600" class="w-100">
        <h5>${a.title}</h5>
        <p>가격 : ${a.price}</p>
      </div>`;
                $('.row').append(템플릿)
            });
        }

        상품추가(products);

        //버튼 누르면 정렬 
        $('.wwe').click(function () {
            products.sort(function (a, b) {
                return a.price - b.price;
            })
            $('.row').html('');

            products.forEach((a) => {
                var 템플릿 =
                    `<div class="col-sm-4">
        <img src="https://via.placeholder.com/600" class="w-100">
        <h5>${a.title}</h5>
        <p>가격 : ${a.price}</p>
      </div>`;
                $('.row').append(템플릿)
            });
        })
