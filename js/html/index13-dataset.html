<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link href="../css/index11.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-3">
        <div class="card p-3">
            <span id="name">이름</span> / <span id="price">가격</span>
        </div>
    </div>

    <script>

        var car = ['소나타', 50000, 'white'];
        // 중괄호는 이름을 붙여야함
        var car2 = { name: '소나타', price: [50000, 3000, 4000] }
        // array 자료 수정하는법
        // car[0] = '아반떼';
        // console.log(car[0]);
        // car2.price = 60000;
        // console.log(car2.price, car2['name']);

        // 자료정렬
        // car.sort();
        // console.log(car);
        // 자료 자르기
        // car.slice(1, 3);

        document.querySelector('#name').innerHTML = (car2.name);
        document.querySelector('#price').innerHTML = (car2.price[0])

        // 문자 사이 변수 넣는 방법 ` 쓰기
        var a = '안녕';
        console.log(`문자${a}문자`)
    </script>

    <style>
        ul.list {
            list-style-type: none;
            margin: 0;
            padding: 0;
            border-bottom: 1px solid #ccc;
        }

        ul.list::after {
            content: '';
            display: block;
            clear: both;
        }

        .tab-button {
            display: block;
            padding: 10px 20px 10px 20px;
            float: left;
            margin-right: -1px;
            margin-bottom: -1px;
            color: grey;
            text-decoration: none;
            cursor: pointer;
        }

        .orange {
            border-top: 2px solid orange;
            border-right: 1px solid #ccc;
            border-bottom: 1px solid white;
            border-left: 1px solid #ccc;
            color: black;
            margin-top: -2px;
        }

        .tab-content {
            display: none;
            padding: 10px;
        }

        .show {
            display: block;
        }
    </style>

    <div class="container mt-5">
        <ul class="list">
            <!-- 몰래 정보 숨기기 기능 data-작명="값" 출력은 셀렉터.dataset.자료이름-->
            <li class="tab-button" data-id="0">Products</li>
            <li class="tab-button orange" data-id="1">Information</li>
            <li class="tab-button" data-id="2">Shipping</li>
        </ul>
        <div class="tab-content">
            <p>상품설명입니다. Product</p>
        </div>
        <div class="tab-content show">
            <p>스펙설명입니다. Information</p>
        </div>
        <div class="tab-content">
            <p>배송정보입니다. Shipping</p>
        </div>
    </div>

    <!-- 자바스크립트 가져오는법 -->
    <script src="../js/dataset.js"></script>



</body>

</html>
