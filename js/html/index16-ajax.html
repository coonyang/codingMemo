<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link href="../css/index11.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>

    <div class="card-group container">
        <div class="card">
            <img src="https://via.placeholder.com/600">
            <div class="card-body">
                <h5 id="name0">Card title</h5>
                <p id="price0">가격 : 70000</p>
                <button class="btn btn-danger">주문하기</button>
            </div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/600">
            <div class="card-body">
                <h5 id="name1">Card title</h5>
                <p id="price1">가격 : 70000</p>
                <button class="btn btn-danger">주문하기</button>
            </div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/600">
            <div class="card-body">
                <h5 id="name2">Card title</h5>
                <p id="price2">가격 : 70000</p>
                <button class="btn btn-danger">주문하기</button>
            </div>
        </div>
    </div>

    <script>
        var products = [
            { id: 0, price: 70000, title: 'Blossom Dress' },
            { id: 1, price: 50000, title: 'Springfield Shirt' },
            { id: 2, price: 60000, title: 'Black Monastery' }
        ];

        for (let i = 0; i < 3; i++) {
            document.querySelectorAll('.card-body h5')[i].innerHTML = products[i].title
            document.querySelectorAll('.card-body p')[i].innerHTML = '가격 : ' + products[i].price
        }
    </script>

    <!-- ajax = 새로고침없이 get,post요청하는기능 -->
    <script>

        // $.get('url')
        // 성공시 .done 뒤 function 이 실행되고 실패시 .fail 뒤 function이 실행됨 
        $.get('https://codingapple1.github.io/hello.txt').done(function (data) {
            console.log(data)
        }).fail(function () {
            console.log('실패함')
        })

        $.get('https://codingapple1.github.io/price.json').done(function (data) {
            console.log(data.price)
        })

        fetch('https://codingapple1.github.io/price.json').then(res => res.json()).then(data => {
            console.log(data)
        })
            .catch(error => {
                console.log(error)
            })
    </script>

</body>

</html>
