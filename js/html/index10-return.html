        console.log(함수(5000))
        // 소수점 오차 해결하기
        // 1. 중간에 반올림
        // 2. 10 곱하고 계산후 10나누기
        console.log(함수(5555))

        function 함수(a) {
            var num = (a * 1.1).toFixed(2)
            return parseFloat(num);
        }


        console.log(타이머(1, 30))
        console.log(타이머(2, 10))

        function 타이머(a, b) {
            return ((a * 60) + b) * 1000
        }

        console.log(할인(70, false))
        console.log(할인(10, true))
        console.log(할인(10.3, false))

        function 할인(a, b) {
            if (b) {
                let num = (a - (a * 0.1) - 1.5).toFixed(1);
                return parseFloat(num);
            } else {
                let num = (a - (a * 0.1)).toFixed(1);
                return parseFloat(num);
            }
        }
