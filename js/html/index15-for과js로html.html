<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .size {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <div class="card p-3">
            <span id="name">이름</span> / <span id="price">가격</span>
        </div>
    </div>

    <form class="container my-5 form-group">
        <p>상품선택</p>
        <select class="form-select mt-2">
            <option>모자</option>
            <option>셔츠</option>
            <option>바지</option>
        </select>
        <select class="form-select mt-2 size">
            <!-- <option>95</option>
            <option>100</option>
            <option>105</option> -->
        </select>
    </form>

    <div id="test">
        <h5>안녕</h5>
    </div>

    <script>
        // 자바스크립트로 html만들어서 적용하는 방법

        var 템플릿 = '<p>안녕</p>';
        document.querySelector('#test').insertAdjacentHTML('beforeend', 템플릿);
        // document.querySelector('#test').innerHTML = 템플릿; // html 안의 모든것을 갈아주는거기때문에 템플릿만 남게됨
        // $('#test').append(템플릿); // 제이쿼리식

        var a = document.createElement('p');
        a.innerHTML = '안녕';
        document.querySelector('#test').appendChild(a);

    </script>

    <script>
        var pants = [28, 30, 32, 34]
        var shirts = [95, 100, 105]

        document.querySelectorAll('.form-select')[0].addEventListener('input', function (e) {
            if (e.target.value === '셔츠') {
                document.querySelectorAll('.form-select')[1].classList.remove('size');
                $('.form-select').eq(1).find('option').remove();
                shirts.forEach(function (k) {
                    $('.form-select').eq(1).append(`<option>${k}</option>`)
                })
                //  기본형 옵션추가
                // const option = document.createElement('option');
                // option.textContent = '28';
                // document.querySelector('.form-select').append(option);
                // 옵션 삭제
                // option.remove();

                // document.querySelectorAll('.form-select')[1].innerHTML = `<option>95</option>
                //                                                   <option>100</option>
                //                                                   <option>105</option>`;
            } else if (e.target.value === '바지') {
                document.querySelectorAll('.form-select')[1].classList.remove('size');
                $('.form-select').eq(1).find('option').remove();
                // array자료에만 붙일수있는 반복문
                // array 자료 개수만큼 반복해줌
                // .forEach(function(a){}) == .forEach((a) => {}) 
                // a = pants 안의 하나하나
                // arrow function은 파라미터가 하나면() 소괄호 생략해도 봐줍니다. 
                // 함수 중괄호 안에 return 한 줄 밖에 없으면 { } 중괄호와 return 동시에 생략해도 봐줍니다.
                // 그래서 간결하니 콜백함수에 자주 사용하는 사람들이 있습니다.
                // 그냥 함수와 arrow function의 기능차이는 하나가 있는데
                // 함수 안에서 this를 써야할 경우
                // - 그냥 함수는 함수 안에서 this를 알맞게 재정의해줍니다.
                // - arrow function은 함수 안에서 this를 재정의해주지 않고 바깥에 있던 this를 그대로 씁니다.
                // 그래서 이벤트리스너 콜백함수안에서 this를 써야하면 arrow function 쓰면 의도와 다르게 동작할 수도 있습니다.
                // 그런데선 쓰지마십시오
                pants.forEach(function (a) {
                    $('.form-select').eq(1).append(`<option>${a}</option>`)
                })


                // ''를 쓰면 엔터키를 못쓰기때문에 `을 씀
                // var 바지 = `<option>28</option>
                // <option>30</option>`;
                // document.querySelectorAll('.form-select')[1].innerHTML = (바지);
            }
            else {
                document.querySelectorAll('.form-select')[1].classList.add('size');
            }
        })

        // 오브젝트 반복하는법
        // for in 반복문
        var obj = { name: 'kim', age: 20 }

        for (var key in obj) {
            console.log(key, obj[key]);
        }

        var car = ['소나타', 50000, 'white'];
        var car2 = { name: '소나타', price: [50000, 3000, 4000] }


        document.querySelector('#name').innerHTML = (car2.name);
        document.querySelector('#price').innerHTML = (car2.price[0])

        var a = '안녕';
        console.log(`문자${a}문자`)
    </script>

    <style>
        ul.list {
            list-style-type: none;
            margin: 0;
            padding: 0;
            border-bottom: 1px solid #ccc;
        }

        ul.list::after {
            content: '';
            display: block;
            clear: both;
        }

        .tab-button {
            display: block;
            padding: 10px 20px 10px 20px;
            float: left;
            margin-right: -1px;
            margin-bottom: -1px;
            color: grey;
            text-decoration: none;
            cursor: pointer;
        }

        .orange {
            border-top: 2px solid orange;
            border-right: 1px solid #ccc;
            border-bottom: 1px solid white;
            border-left: 1px solid #ccc;
            color: black;
            margin-top: -2px;
        }

        .tab-content {
            display: none;
            padding: 10px;
        }

        .show {
            display: block;
        }
    </style>

    <div class="container mt-5">
        <ul class="list">
            <li class="tab-button" data-id="0">Products</li>
            <li class="tab-button orange" data-id="1">Information</li>
            <li class="tab-button" data-id="2">Shipping</li>
        </ul>
        <div class="tab-content">
            <p>상품설명입니다. Product</p>
        </div>
        <div class="tab-content show">
            <p>스펙설명입니다. Information</p>
        </div>
        <div class="tab-content">
            <p>배송정보입니다. Shipping</p>
        </div>
    </div>


    <script src="../js/dataset.js"></script>



</body>

</html>
