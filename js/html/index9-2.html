<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../css/index9.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <span class="navbar-brand">Navbar</span>
            <button class="navbar-toggler" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    <div style="overflow: hidden;">
        <div class="slide-container">
            <div class="slide-box">
                <img src="../img/바이퍼.jpg">
            </div>
            <div class="slide-box">
                <img src="../img/신데렐라.jpg">
            </div>
            <div class="slide-box">
                <img src="../img/크라운.jpg">
            </div>
        </div>
    </div>
    <button class="slide-back">이전</button>
    <button class="slide-1">1</button>
    <button class="slide-2">2</button>
    <button class="slide-3">3</button>
    <button class="slide-next">다음</button>
    <div style="height: 1000px;"></div>
    <div class="모작" style="width: 200px; height: 100px; overflow-y: scroll;">모작은 쌀숭이 이다. 모작은 쌀숭이 이다. 모작은 쌀숭이 이다. 모작은 쌀숭이
        이다. 모작은
        쌀숭이 이다. 모작은 쌀숭이 이다. 모작은
        쌀숭이 이다.</div>
    <script>
        var 현재사진 = 1;
        document.querySelector('.slide-back').addEventListener('click', function () {
            if (현재사진 == 1) {
                document.querySelector('.slide-container').style.transform = 'translateX(-200vw)';
                현재사진 = 3;
            } else if (현재사진 == 2) {
                document.querySelector('.slide-container').style.transform = 'translateX(0vw)';
                현재사진 = 1
            } else if (현재사진 == 3) {
                document.querySelector('.slide-container').style.transform = 'translateX(-100vw)';
                현재사진 = 2;
            }
        })
        document.querySelector('.slide-1').addEventListener('click', function () {
            document.querySelector('.slide-container').style.transform = 'translateX(0vw)';
            현재사진 = 1;
        })
        document.querySelector('.slide-2').addEventListener('click', function () {
            document.querySelector('.slide-container').style.transform = 'translateX(-100vw)';
            현재사진 = 2;
        })
        document.querySelector('.slide-3').addEventListener('click', function () {
            document.querySelector('.slide-container').style.transform = 'translateX(-200vw)';
            현재사진 = 3;
        })
        document.querySelector('.slide-next').addEventListener('click', function () {
            if (현재사진 == 1) {
                document.querySelector('.slide-container').style.transform = 'translateX(-100vw)';
                현재사진 = 2;
            } else if (현재사진 == 2) {
                document.querySelector('.slide-container').style.transform = 'translateX(-200vw)';
                현재사진 = 3
            } else if (현재사진 == 3) {
                document.querySelector('.slide-container').style.transform = 'translateX(0vw)';
                현재사진 = 1;
            }
        })

        // 페이지의 스크롤이 100이 넘어가면 네브바 글씨 조정
        window.addEventListener('scroll', function () {
            if (window.scrollY > 100) {
                document.querySelector('.navbar-brand').style.fontSize = '10px'
            } else {
                document.querySelector('.navbar-brand').style.fontSize = '20px'
            }
        })

        document.querySelector('.모작').addEventListener('scroll', function () {
            // 스크롤높이+보이는div높이 > 실제높이
            if (document.querySelector('.모작').scrollTop + document.querySelector('.모작').clientHeight > document.querySelector('.모작').scrollHeight - 5) {
                alert('띄어!');
            }
        })

        // 페이지의 스크롤 높이
        // document.querySelector('html').scrollHeight
    </script>


</body>

</html>
