<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/index5.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="black-bg">
        <div class="white-bg">
            <h4>로그인하세요</h4>
            <form action="success.html">
                <div class="my-3">
                    <input type="text" class="form-control" id="email">
                </div>
                <div class="my-3">
                    <input type="password" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">전송</button>
                <button type="button" class="btn btn-danger" id="close">닫기</button>
            </form>
        </div>
    </div>

    <script>
        if (1 != 3) {
            console.log('정답');
        } else if (1 == 2) {
            console.log('정답2');
        } else {
            console.log('정답3');
        }

        document.querySelector('form').addEventListener('submit', function (e) {
            var 입력한값 = document.getElementById('email').value;
            if (document.querySelectorAll('.form-control')[0].value == '') {
                alert('아이디를 입력하라고');
                e.preventDefault();
            }
            if (document.querySelectorAll('.form-control')[1].value == '') {
                alert('비밀번호 입력하라고');
                e.preventDefault();
            }
            if (document.querySelectorAll('.form-control')[1].value.length < 6) {
                alert('비밀번호 6자리 이상 입력하라고');
            }
            if (/\S+@\S+\.\S+/.test(입력한값) == false) {
                alert('이메일 형식으로 입력하셈');
                e.preventDefault();
            }
        })

    </script>

    <button id="bt">로그인</button>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script>
        $('#bt').on('click', function () {
            $('.black-bg').addClass('see');
        })
        $('#close').on('click', function () {
            $('.black-bg').removeClass('see');
        })

        // 이벤트 버블링 = 이벤트가 상위html로 퍼지는 현상
        document.querySelector('.black-bg').addEventListener('click', function (e) {

            // e.target; // 유저가 실제로 누른거
            // e.currentTarget; // 이벤트 리스너 달린 곳
            // this;
            // e.preventDefault(); // 기본 동작 막아줌
            // e.stopPropagation(); // 이벤트 버블링 막아줌
            // if에 제이쿼리 쓸거면 서로 제이쿼리를 넣던가 둘다 빼던가 해야함 제이쿼리는 결과값이 다르게 출력되기 떄문
            if (e.target == document.querySelector('.black-bg')) {
                $('.black-bg').removeClass('see');
            }
        })
    </script>
</body>

</html>
