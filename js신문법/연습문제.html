<button id="버튼">버튼이에요</button>

<script>
    var 사람 = {
        name: '손흥민',
        sayHi: () => `안녕 나는 ${사람.name}`

    }

    console.log(사람.sayHi()) // 안녕 나는 손흥민

    var 자료 = {
        data: [1, 2, 3, 4, 5],
    }
    자료.전부더하기 = function () {
        let b = 0;
        this.data.forEach((a) => {
            b = b + a;
        })
        return b;
    }
    console.log(자료.전부더하기());


    document.getElementById('버튼').addEventListener('click', function () {
        setTimeout(() => {
            console.log(this.innerHTML)
        }, 1000)
    })


</script>
