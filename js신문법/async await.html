<script>

    async function 함수() { // promise 기능을 해줌 // 성공만 가능
        return 1 + 1
    } // 연산이 성공하면 성공 // 실패처리하려면 Promise.reject() 를 리턴값으로 보내야함

    함수().then(function (결과) {
        console.log('성공')
        console.log(결과)
    })

    async function 더하기() {
        var 프로미스 = new Promise(function (성공, 실패) {
            var 연산 = 1 + 1;
            성공(연산);
        })

        // 프로미스.then(function () {
        //     console.log('성공')
        // })

        // try {} catch {} try를 해보고 에러나면 catch
        try {
            var 결과 = await 프로미스; // async 안에서 쓰는 await은 then 대신 사용가능 // 실패시 멈춤
            console.log(결과)
        } catch {
            console.log('아쉽지')
        }

    }
    더하기()
</script>
