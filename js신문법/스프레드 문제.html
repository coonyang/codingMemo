<script>
    var a = [1, 2, 3];
    var b = '김밥';
    var c = [...b, ...a];
    console.log(c); // 김 밥 1 2 3

    var a = [1, 2, 3];
    var b = ['you', 'are'];
    var c = function (a, b) {
        console.log([[...a], ...[...b]][1])
    }
    c(a, b); // [[1,2,3],you,are][1] = you

    function 함수(a = 5, b = a * 2) {
        console.log(a + b);
        return 10
    }
    함수(3); // 3+3*2=9

    function 함수(a = 5, b = a * 2) {
        console.log(a + b);
    }
    함수(undefined, undefined); // 5+5*2=15

    function 어레이(...rest) {
        return rest
    }

    var newArray = 어레이(1, 2, 3, 4, 5);
    console.log(newArray);

    var number = [1, 23, 4, 35, 56423, 56426, 426, 346, 325, 3, 3]
    console.log(Math.max(...number)) // Math.max = 최대값 구해주는 함수

    function 정렬(a) {
        console.log(...[...a].sort())
    }

    정렬('bear');

    function 글자세기(a) {
        const 결과 = {};
        [...a].forEach((e, i) => {
            if (결과[e] > 0) {
                결과[e]++
            } else {
                결과[e] = 1
            }
        })
        console.log(결과)
    }

    글자세기('aabbccc')

    const 사람 = {};       // 빈 객체
    사람['이름'] = '철수';  // 동적으로 키 추가!
    사람['나이'] = 20;

    console.log(사람); // { 이름: '철수', 나이: 20 }

</script>
