<script>
    // 동기 처리

    console.log(1)
    console.log(2)
    console.log(3)

    // 비동기 처리 : 오래 걸리는 작업을 뒤로 보내 다른거부터 처리하는 방식

    console.log(1)
    setTimeout(() => { console.log(2) }, 1000)
    console.log(3)

    element.addEventListener('click', function () {

    })
    $.ajax()

    // 함수1 을 먼저 실행하고 싶을때 콜백함수를 이용한 함수 디자인
    function 함수1(구멍) {
        console.log(10)
        구멍();
    }

    function 함수2() {
        console.log(20)
    }

    함수1(함수2);

    // 콜백함수가 더러우면 promise 사용
    var 프로미스 = new Promise(function (성공, 실패) { // 성공/실패 판정해주는 기계
        // 성공(); // 성공판정
        // 실패(); // 실패판정
        setTimeout(() => {
            var 어려운연산 = 1 + 1
            성공(어려운연산); // 성공 결과도 전해짐
        })

    });

    프로미스.then(function (결과) { // 프로미스가 성공일 경우 코드를 실행
        console.log('성공했어요')
        console.log(결과)
    }).catch(function () { // 실패일 경우 코드 실행
        console.log('실패했어요')
    })

    fetch().then().catch() // fetch 는 항상 프로미스를 리턴함
</script>
