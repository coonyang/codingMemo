<script>
    // 동기 처리 : 코드가 순차적(위에서 아래로)으로 실행되는 방식
    // 비동기 처리 : 오래 걸리는 작업을 뒤로 보내 다른거부터 처리하는 방식

    // 비동기 처리의 방식
    // setTimeout() 으로 뒤로 보냄
    console.log(1)
    setTimeout(() => { console.log(2) }, 1000)
    console.log(3)

    // addEventListener 를 이용해 조건을 걸음
    element.addEventListener('click', function () {
        // 클릭하면 실행될 코드
    })

    // 데이터를 받기 전까지 다른 코드들을 실행시켜줌
    $.ajax()

    // 함수1 을 먼저 실행하고 싶을때 콜백함수를 이용한 함수 디자인
    function 함수1(구멍) {
        console.log(10)
        구멍();
    }

    function 함수2() {
        console.log(20)
    }

    함수1(함수2); // 출력 : 10, 20

    // 콜백함수가 더러우면 promise 사용
    var 프로미스 = new Promise(function (성공, 실패) { // 성공/실패 판정해주는 기계
        // 성공(); // 성공판정
        // 실패(); // 실패판정
        setTimeout(() => {
            var 어려운연산 = 1 + 1
            성공(어려운연산); // 성공 결과도 전해짐
        })
    });

    프로미스.then(function (결과) { // 프로미스가 성공일 경우 코드를 실행
        console.log('성공했어요')
        console.log(결과)
    }).catch(function () { // 실패일 경우 코드 실행
        console.log('실패했어요')
    })

    fetch().then().catch() // fetch 는 항상 프로미스를 리턴함
    fetch('주소').then(res => res.json().then(data => console.log(data)).catch(err => console.log('에러')))
    // res => res.json() = furction(response){return response.json()}을 화살표 할수로 줄인것, 들어온 응답을 자바스크립트 객체로변환시켜줌

    // 프로미스를 동기식 코드처럼 보이게 쓰는 방식 async / await
    async function 결과출력함수() { // .then() 대신 try/catch를 씀
        try {
            // await를 붙이면 프로미스가 '성공'할 때까지 코드 실행을 잠시 멈추고 기다림
            var 결과 = await 프로미스;

            console.log('성공했어요');
            console.log(결과); // 2 출력
        } catch (에러) {
            console.log('실패했어요');
        }
    }

    결과출력함수();

</script>
