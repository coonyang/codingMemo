<html>
<div>
    <img id="test" src="">
</div>


<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script>

    var img = document.querySelector('#test');
    var 판정 = new Promise(function (성공, 실패) {
        img.addEventListener('load', function () {
            성공();
        })
        img.addEventListener('error', function () {
            실패();
        })
    })
    판정.then(function () {
        console.log('로드성공')
    }).catch(function () {
        console.log('로드실패')
    })

    var 판독기 = new Promise(function (성공, 실패) {
        $.get('https://codingapple1.github.io/hello.txt').done(function (결과) {
            성공(결과);
        })
    })
    판독기.then(function (결과) {
        console.log(결과)

        var 프로미스 = new Promise(function (성공, 실패) {
            $.get('https://codingapple1.github.io/hello2.txt').done(function (결과) {
                성공(결과)
            })
        })

        return 프로미스;
    }).then(function (결과) {
        console.log(결과)
    }).catch(function () {
        console.log('실패')
    })







</script>

</html>
