<script>
    // 선언, 할당, 범위, 호이스팅

    // var 재선언 O 재할당 O 범위 function
    // 재선언
    var 이름 = 'Kim';
    var 이름 = 'Park';
    // 재할당
    이름 = 'Lee';
    // 펑션 밖에서 쓰면 안됨
    function 함수() {
        var 이름 = 'Kim';
        이름;
    }

    // let 재선언 X 재할당 O 범위 {}
    let 나이 = 20;
    let 나이 = 30;
    나이 = 40;

    // const 재선언 X 재할당 X 범위 {}
    // 이건 변수를 재할당하는게 아닌 내용을 바꾸는 것
    const 사람 = { 이름: 'Kim' }
    사람.이름 = 'Park'

    // 값을 절대 바꿀수 없는 오브젝트 만드는 법
    Object.freeze(사람);

    // 호스팅현상 = 변수의 선언을 변수 범위 맨 위로 끌고오는 현상 / 함수도 포함
    console.log(x) // undefinded 가 뜸 > x 라는 변수가 만들어지긴 했지만 값을 찾지 못했다
    var x = 50;
    console.log(x)

    // 전역 변수 : 모든 곳에서 쓸 수 있는 변수
    // 지역 변수 : 한정된 곳에서 쓸 수 있는 변수
    // 제일 바깥쪽에 변수를 선언하면 전역 변수가 됨
    // window 는 자바스크립트 기본 함수를 담은 오브젝트 이기 때문에 window.변수 를 하면 전역 변수가 됨
    window.이름 = 'Kim';

</script>

</html>
