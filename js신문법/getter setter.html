<script>
    // 오브젝트에서 자료를 꺼내는 함수를 만들어 씀
    // 자료가 복잡할때 좋음
    // 자료 수정시 좋음
    // set 데이터를 변경하는 함수 // set 은 파라미터가 있어야함
    // get 데이터를 꺼내쓰는 함수 // get 은 return이 필요함
    // set get 을 넣으면 () 빼도 됨

    var 사람 = {
        name: 'Park',
        age: 30,
        get nextAge() { // 자료 수정하는 함수 // 옆에 get 을 붙일수 있음
            return this.age + 1
        },
        set setAge(나이) { // 사람.setAge(20) 이렇게 소괄호 하기 싫으면 set 추가하면됨
            this.age = parseInt(나이)
        }
    }

    사람.nextAge;
    사람.age = 20;
    사람.setAge = 20; // 데이터를 잘못 입력했을때 사전차단 가능

    // class에서 사용하는 get/set
    class 사람 {
        constructor() {
            this.name = 'Park';
            this.age = 20;
        }
        get nextAge() {
            return this.age + 1
        }
        set setAge(나이) {
            this.age = 나이;
        }
    }

    var 사람1 = new 사람()
    사람1.nextAge;
    사람1.setAge = 30

</script>
